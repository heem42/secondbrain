name: SecondBrain
options:
  bundleIdPrefix: com.secondbrain
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"

targets:
  SecondBrain:
    type: application
    platform: iOS
    sources:
      - path: SecondBrain
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.secondbrain.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        # Local dev API base; overridden per-config as needed (ARCHITECTURE.md §11).
        INFOPLIST_KEY_SBApiBaseURL: "http://localhost:3000/api"
