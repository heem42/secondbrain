# Second Brain — PowerSync sync rules (ARCHITECTURE.md §8)
#
# Defines the per-user "buckets" that get streamed into on-device SQLite.
# A user syncs: their private/global data, plus every list they own or are a
# member of, and the tasks/subtasks/tags under those lists.
#
# request.user_id() = the authenticated Supabase user (from the JWT).
# Data queries can only filter on columns that physically exist on the row —
# that's why subtasks/task_tags carry a denormalized list_id (see the
# 20260703135235_powersync_denorm_list_id migration).

bucket_definitions:
  # -------------------------------------------------------------------------
  # Per-user global data: the user's own profile, tags, and list groups.
  # -------------------------------------------------------------------------
  user_global:
    parameters: select request.user_id() as user_id
    data:
      - select * from profiles    where id = bucket.user_id
      - select * from tags        where owner_id = bucket.user_id
      - select * from list_groups where owner_id = bucket.user_id
      # co-members' display names (so shared lists can show who's who)
      - select id, display_name, avatar_url, updated_at from profiles

  # -------------------------------------------------------------------------
  # One bucket per accessible list: owned lists UNION lists shared with me.
  # Everything under the list rides along, filtered by list_id.
  # -------------------------------------------------------------------------
  by_list:
    parameters: |
      select id as list_id from lists where owner_id = request.user_id()
      union
      select list_id from list_members where user_id = request.user_id()
    data:
      - select * from lists        where id      = bucket.list_id
      - select * from list_members where list_id = bucket.list_id
      - select * from tasks        where list_id = bucket.list_id
      - select * from subtasks     where list_id = bucket.list_id
      - select * from task_tags    where list_id = bucket.list_id
